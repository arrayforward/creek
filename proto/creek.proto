syntax = "proto3";

package creek.v1;

message HelloRequest {
  string name = 1;
  string sid = 2;
  bool sticky = 3;
}

message HelloReply {
  string message = 1;
  string backend_id = 2;
}

service Greeter {
  rpc SayHello(HelloRequest) returns (HelloReply);
}

message Endpoint {
  string endpoint_id = 1;
  string service = 2;
  string owner_leaf = 3;
  string owner_node = 4;
  string target = 5;
  uint64 version = 6;
  uint64 updated_ms = 7;
  bool alive = 8;
}

message RegisterRequest {
  Endpoint endpoint = 1;
}

message RegisterReply {
  bool accepted = 1;
  string error = 2;
}

message HeartbeatRequest {
  string endpoint_id = 1;
}

message HeartbeatReply {
  bool accepted = 1;
}

message DeregisterRequest {
  string endpoint_id = 1;
}

message DeregisterReply {
  bool accepted = 1;
}

service LeafControl {
  rpc Register(RegisterRequest) returns (RegisterReply);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatReply);
  rpc Deregister(DeregisterRequest) returns (DeregisterReply);
}

message DirectorySnapshot {
  string source_id = 1;
  uint64 version = 2;
  uint64 generated_ms = 3;
  repeated Endpoint endpoints = 4;
  // Tombstones for endpoints the source authoritatively removed (dead /
  // deregistered). Only endpoint_id/version/updated_ms are meaningful.
  // Recipients erase matching entries whose version is not newer and keep
  // the tombstone briefly so delayed older snapshots cannot resurrect them.
  repeated Endpoint removed_endpoints = 5;
}

message RoutedRequest {
  string request_id = 1;
  string origin_leaf = 2;
  string origin_node = 3;
  string destination_leaf = 4;
  string destination_node = 5;
  string endpoint_id = 6;
  string rpc_name = 7;
  map<string, string> metadata = 8;
  bytes body = 9;
  uint64 deadline_ms = 10;
  uint32 hop_limit = 11;
}

message RoutedResponse {
  string request_id = 1;
  string origin_leaf = 2;
  string origin_node = 3;
  string destination_leaf = 4;
  string destination_node = 5;
  bytes body = 6;
  int32 status = 7;
  string error = 8;
  uint32 hop_limit = 9;
}

// Opens a proxied bidi/unary stream. Sent by the ingress (origin) leaf to
// the leaf that owns the endpoint. rpc_name is the full method path
// ("/pkg.Service/Method").
message RoutedStreamOpen {
  string request_id = 1;
  string origin_leaf = 2;
  string origin_node = 3;
  string destination_leaf = 4;
  string destination_node = 5;
  string endpoint_id = 6;
  string rpc_name = 7;
  map<string, string> metadata = 8;
  uint64 deadline_ms = 9;
  uint32 hop_limit = 10;
}

// One message frame of a proxied stream. from_origin=true means the frame
// travels client-side -> backend (ingress leaf -> destination leaf); false
// means backend -> client. half_close (only meaningful with from_origin)
// signals the client finished writing (gRPC writes-done).
message RoutedStreamFrame {
  string request_id = 1;
  bytes payload = 2;
  bool half_close = 3;
  bool from_origin = 4;
  string origin_leaf = 5;
  string origin_node = 6;
  string destination_leaf = 7;
  string destination_node = 8;
  uint32 hop_limit = 9;
}

// Terminates a proxied stream. from_origin=true: the ingress side cancels
// (client went away / idle timeout). from_origin=false: the backend call
// finished; status/error carry the gRPC status code and message.
message RoutedStreamClose {
  string request_id = 1;
  int32 status = 2;
  string error = 3;
  bool from_origin = 4;
  string origin_leaf = 5;
  string origin_node = 6;
  string destination_leaf = 7;
  string destination_node = 8;
  uint32 hop_limit = 9;
}

message WireMessage {
  oneof body {
    DirectorySnapshot directory = 1;
    RoutedRequest request = 2;
    RoutedResponse response = 3;
    RoutedStreamOpen stream_open = 4;
    RoutedStreamFrame stream_frame = 5;
    RoutedStreamClose stream_close = 6;
  }
}

message MetricRequest {
  bool previous_minute = 1;
  bool take = 2;
}

message MetricPoint {
  string direction = 1;
  string rpc_name = 2;
  string metadata = 3;
  uint64 calls = 4;
  uint64 errors = 5;
  uint64 bytes = 6;
  uint64 latency_us = 7;
}

message MetricReply {
  repeated MetricPoint points = 1;
}

message DirectoryRequest {
}

// Every endpoint this leaf can currently see (its own local endpoints plus
// everything learned from node directory broadcasts), dead ones included.
message DirectoryReply {
  repeated Endpoint endpoints = 1;
  string leaf_id = 2;
  string node_id = 3;
}

service Admin {
  rpc Metrics(MetricRequest) returns (MetricReply);
  rpc Directory(DirectoryRequest) returns (DirectoryReply);
  rpc SetStickyStrategy(StickyStrategyRequest) returns (StickyStrategyReply);
  rpc SetBreakerConfig(BreakerConfigRequest) returns (BreakerConfigReply);
  rpc PushWasmModule(PushWasmRequest) returns (PushWasmReply);
  rpc ListWasmModules(ListWasmRequest) returns (ListWasmReply);
  rpc UnloadWasmModule(UnloadWasmRequest) returns (UnloadWasmReply);
}

message StickyStrategyRequest {
  string service = 1;
  int32 strategy = 2;
  int64 ttl_ms = 3;
}

message StickyStrategyReply {
  bool accepted = 1;
  string error = 2;
}

message BreakerConfigRequest {
  string endpoint_id = 1;
  int64 cooldown_ms = 2;
  int64 latency_threshold_us = 3;
  double error_rate_threshold = 4;
  int32 consecutive_failure_threshold = 5;
}

message BreakerConfigReply {
  bool accepted = 1;
  string error = 2;
}

message PushWasmRequest {
  string module_name = 1;
  bytes wasm_bytes = 2;
}

message PushWasmReply {
  bool accepted = 1;
  uint32 module_id = 2;
  string error = 3;
}

message ListWasmRequest {
}

message ListWasmReply {
  repeated WasmModuleInfo modules = 1;
}

message WasmModuleInfo {
  uint32 module_id = 1;
  string name = 2;
  int64 size = 3;
}

message UnloadWasmRequest {
  uint32 module_id = 1;
}

message UnloadWasmReply {
  bool accepted = 1;
  string error = 2;
}
